name: Uniffi XForge (macOS)

on:
  push:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish release assets (requires secrets)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  bundle:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add target
        run: rustup target add aarch64-apple-darwin
      - name: Install xforge-cli
        run: cargo install --git https://github.com/nuCode-Tech/x-forge --branch main xforge-cli --bin xforge-cli
      - name: Build library (macOS)
        run: |
          cargo build --release \
            --manifest-path Cargo.toml \
            --target aarch64-apple-darwin
      - name: Bundle artifacts (macOS)
        run: |
          xforge-cli bundle \
            --manifest-dir . \
            --target aarch64-apple-darwin \
            --output-dir dist \
            --profile release
      - name: Publish release
        if: ${{ github.event_name == 'push' || inputs.publish == 'true' }}
        env:
          LIBFORGE_PRIVATE_KEY: ${{ secrets.LIBFORGE_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          xforge-cli publish \
            --repository nuCode-Tech/uniffi-xforge \
            --manifest dist/xforge-manifest.json \
            --assets-dir dist
