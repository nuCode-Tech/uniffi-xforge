name: Uniffi XForge (macOS)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish release assets (requires secrets)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  bundle:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add target
        run: rustup target add aarch64-apple-darwin
      - name: Install libforge-cli
        run: cargo install --git https://github.com/nuCode-Tech/lib-forge --bin libforge-cli
      - name: Build library (macOS)
        run: |
          cargo build --release \
            --manifest-path Cargo.toml \
            --target aarch64-apple-darwin
      - name: Bundle artifacts (macOS)
        run: |
          libforge-cli bundle \
            --manifest-dir . \
            --target aarch64-apple-darwin \
            --output-dir dist \
            --profile release
      - name: Publish release
        if: ${{ inputs.publish == 'true' }}
        env:
          LIBFORGE_PRIVATE_KEY: ${{ secrets.LIBFORGE_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          libforge-cli publish \
            --repository nuCode-Tech/uniffi-xforge \
            --manifest dist/libforge-manifest.json \
            --assets-dir dist
