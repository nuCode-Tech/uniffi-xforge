name: Uniffi XForge (Apple + Android)

on:
  push:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish release assets (requires secrets)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  bundle:
    runs-on: macos-latest
    strategy:
      max-parallel: 1
      matrix:
        target:
          - aarch64-apple-ios
          - aarch64-apple-ios-sim
          - aarch64-linux-android
    permissions:
      contents: write
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Setup Android SDK
        if: ${{ matrix.target == 'aarch64-linux-android' }}
        uses: android-actions/setup-android@v3
      - name: Setup Android NDK
        if: ${{ matrix.target == 'aarch64-linux-android' }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false
      - name: Install xforge-cli
        run: cargo install --git https://github.com/nuCode-Tech/x-forge --branch feat/linker-scripts-and-docs xforge-cli --bin xforge-cli
      - name: Build library
        run: |
          if [ "${{ matrix.target }}" = "aarch64-linux-android" ]; then
            LLVM_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/darwin-x86_64/bin"
            export PATH="$LLVM_BIN:$PATH"
            export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$LLVM_BIN/aarch64-linux-android35-clang"
          fi

          cargo build --release \
            --manifest-path Cargo.toml \
            --target ${{ matrix.target }}
      - name: Bundle artifacts
        run: |
          xforge-cli bundle \
            --manifest-dir . \
            --target ${{ matrix.target }} \
            --output-dir dist \
            --profile release
      - name: Publish release
        if: ${{ github.event_name == 'push' || inputs.publish == 'true' }}
        env:
          XFORGE_PRIVATE_KEY: ${{ secrets.LIBFORGE_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          xforge-cli publish \
            --repository nuCode-Tech/uniffi-xforge \
            --manifest dist/xforge-manifest.json \
            --assets-dir dist
